<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroceryBot - AI Grocery Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>GroceryBot</h1>
            <p>Your AI grocery & produce assistant</p>
        </header>

        <div class="chat-messages" id="messages">
            <div class="message bot">
                <div class="message-content">
                    Hi! I'm GroceryBot. Ask me anything about produce freshness, storage tips, food safety, or recipes!
                </div>
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Ask about produce..."
                   onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
